<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>time's up</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #282828;
      color: #ebdbb2;
      font-family: '0xProto', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .blocked-container { max-width: 400px; }
    .blocked-title {
      font-size: 20px;
      font-weight: 400;
      color: #ebdbb2;
      margin-bottom: 16px;
    }
    .blocked-domain {
      font-size: 16px;
      color: #d65d0e;
      margin-bottom: 8px;
    }
    .blocked-limit {
      font-size: 12px;
      color: #a89984;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="blocked-container">
    <h1 class="blocked-title">time's up.</h1>
    <p class="blocked-domain" id="blockedDomain">example.com</p>
    <p class="blocked-limit">daily limit: <span id="dailyLimit">30 minutes</span></p>
  </div>
  <script src="js/blocked.js"></script>
</body>
</html>
